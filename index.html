<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lexend+Deca:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | Stats preview card component</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <div class="card">
        <div class="image"></div>
        <div class="content">
          <div class="wrapper">
            <div class="text-content">
              <h1 class="title">
                Get <span class="highlight">insights</span> that help your
                business grow.
              </h1>
              <p class="title-description">
                Discover the benefits of data analytics and make better
                decisions regarding revenue, customer experience, and overall
                efficiency.
              </p>
            </div>
            <div class="stats">
              <div class="item">
                <h2 class="stat">10k+</h2>
                <p class="heading">COMPANIES</p>
              </div>
              <div class="item">
                <h2 class="stat">314</h2>
                <p class="heading">TEMPLATES</p>
              </div>
              <div class="item">
                <h2 class="stat">12m+</h2>
                <p class="heading">QUERIES</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Oladayo Adekoya</a>.
    </footer>
  </body>
</html>
